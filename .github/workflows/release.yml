name: release-artifacts

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0 branch
      - run: cargo test --workspace --all-targets --locked
      - run: cargo build --workspace --release --locked
      - name: Generate CycloneDX SBOMs
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --format json
      - name: Assemble reproducible release archive
        run: |
          mkdir -p dist/sigil
          cp target/release/sigilc dist/sigil/
          cp Cargo.lock LICENSE README.md dist/sigil/
          cp sigilc/bom.json dist/sigil/sigilc.cdx.json
          cp sigil_rt/bom.json dist/sigil/sigil_rt.cdx.json
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -czf dist/sigil-linux-x86_64.tar.gz -C dist sigil
          sha256sum dist/sigil-linux-x86_64.tar.gz > dist/SHA256SUMS
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Keyless-sign release archive
        run: cosign sign-blob --yes --bundle dist/sigil-linux-x86_64.sigstore.json dist/sigil-linux-x86_64.tar.gz
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/sigil-linux-x86_64.tar.gz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-release
          path: dist/
          if-no-files-found: error
